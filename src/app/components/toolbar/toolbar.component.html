<div class="toolbar" (appClickOutside)="closeMenus()">
  <!-- Brand -->
  <div class="toolbar-brand">
    <span class="brand-icon">⊞</span>
    <span class="brand-label">Tables</span>
  </div>

  <div class="toolbar-divider"></div>

  <!-- Undo / Redo -->
  <div class="toolbar-group">
    <button class="tb-btn" [disabled]="!canUndo" (click)="undo()" title="Undo (Ctrl+Z)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M3 7L1 5l2-2M1 5h8a4 4 0 010 8H6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
    <button class="tb-btn" [disabled]="!canRedo" (click)="redo()" title="Redo (Ctrl+Y)">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
        <path d="M13 7l2-2-2-2M15 5H7a4 4 0 000 8h3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>
  </div>

  <div class="toolbar-divider"></div>

  <!-- Structure -->
  <div class="toolbar-group">
    <button class="tb-btn tb-btn--label" (click)="addRow()" title="Add Row">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x="1" y="1" width="12" height="5" rx="1" stroke="currentColor" stroke-width="1.2"/>
        <rect x="1" y="8" width="12" height="5" rx="1" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2 1"/>
        <path d="M7 9.5v2M6 10.5h2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <span>Add Row</span>
    </button>
    <button class="tb-btn tb-btn--label" (click)="addColumn()" title="Add Column">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <rect x="1" y="1" width="5" height="12" rx="1" stroke="currentColor" stroke-width="1.2"/>
        <rect x="8" y="1" width="5" height="12" rx="1" stroke="currentColor" stroke-width="1.2" stroke-dasharray="2 1"/>
        <path d="M9.5 7h2M10.5 6v2" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
      </svg>
      <span>Add Col</span>
    </button>
  </div>

  <div class="toolbar-divider"></div>

  <!-- Themes -->
  <div class="toolbar-group toolbar-dropdown-host">
    <button class="tb-btn tb-btn--label" (click)="showThemeMenu = !showThemeMenu; showExportMenu = false">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <circle cx="4" cy="4" r="2.5" fill="#FF9100"/>
        <circle cx="10" cy="4" r="2.5" fill="#1d4ed8"/>
        <circle cx="4" cy="10" r="2.5" fill="#16a34a"/>
        <circle cx="10" cy="10" r="2.5" fill="#7c3aed"/>
      </svg>
      <span>Theme</span>
    </button>
    <div class="toolbar-dropdown" *ngIf="showThemeMenu">
      <div class="dropdown-item"
           *ngFor="let theme of themes"
           (click)="applyTheme(theme)">
        <span class="theme-swatch"
              [style.background]="theme.headerStyle?.bgColor || theme.tableStyle.bgColor"
              [style.border-color]="theme.tableStyle.borderColor">
        </span>
        {{ theme.label }}
      </div>
    </div>
  </div>

  <div class="toolbar-divider"></div>

  <!-- Export -->
  <div class="toolbar-group toolbar-dropdown-host">
    <button class="tb-btn tb-btn--label tb-btn--accent"
            (click)="showExportMenu = !showExportMenu; showThemeMenu = false">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M7 1v8M4 6l3 3 3-3M2 10v1a1 1 0 001 1h8a1 1 0 001-1v-1" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <span>Export</span>
    </button>
    <div class="toolbar-dropdown toolbar-dropdown--right" *ngIf="showExportMenu">
      <div class="dropdown-item" (click)="exportSVG()">Export SVG</div>
      <div class="dropdown-item" (click)="exportPNG()">Export PNG</div>
      <div class="dropdown-item" (click)="exportJPEG()">Export JPEG</div>
      <div class="dropdown-divider"></div>
      <div class="dropdown-item" (click)="exportJSON()">Save State (JSON)</div>
      <label class="dropdown-item dropdown-item--upload">
        Load State (JSON)
        <input type="file" accept=".json" (change)="importJSON($event)" hidden>
      </label>
    </div>
  </div>

    <!-- Add To Project -->
  <button class="tb-btn tb-btn--label tb-btn--green" (click)="addToProject()" title="Add to Project">
    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
      <path d="M7 1v8M4 6l3 3 3-3M2 10v1a1 1 0 001 1h8a1 1 0 001-1v-1"
            stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span>Add to Project</span>
  </button>

  <!-- Spacer -->
  <div class="toolbar-spacer"></div>

  <!-- Reset -->
  <button class="tb-btn tb-btn--danger" (click)="resetTable()" title="Reset table">
    Reset
  </button>
</div>
