<div class="left-panel" *ngIf="state">

  <!-- Structure Section -->
  <div class="panel-section">
    <div class="section-header" (click)="toggleStructure()">
      <span class="section-title">Structure</span>
      <span class="section-badge">{{ rowCount }}r × {{ colCount }}c</span>
      <svg class="chevron" [class.chevron--open]="structureExpanded"
           width="12" height="12" viewBox="0 0 12 12">
        <path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.4"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>

    <div class="section-body" *ngIf="structureExpanded">
      <!-- Rows list -->
      <div class="list-label">Rows</div>
      <div class="struct-list">
        <div class="struct-item" *ngFor="let row of state.rows; let i = index">
          <span class="struct-item-label">
            <span *ngIf="row.isHeader" class="badge-header">H</span>
            Row {{ i + 1 }}
          </span>
          <span class="struct-item-size">{{ row.height }}px</span>
          <button class="icon-btn icon-btn--danger"
                  (click)="deleteRow(row.id)"
                  [disabled]="state.rows.length <= 1"
                  title="Delete row">
            <svg width="12" height="12" viewBox="0 0 12 12">
              <path d="M2 6h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
      <button class="add-btn" (click)="addRow()">+ Add Row</button>

      <!-- Columns list -->
      <div class="list-label" style="margin-top: 10px">Columns</div>
      <div class="struct-list">
        <div class="struct-item" *ngFor="let col of state.columns; let i = index">
          <span class="struct-item-label">Col {{ i + 1 }}</span>
          <span class="struct-item-size">{{ col.width }}px</span>
          <button class="icon-btn icon-btn--danger"
                  (click)="deleteColumn(col.id)"
                  [disabled]="state.columns.length <= 1"
                  title="Delete column">
            <svg width="12" height="12" viewBox="0 0 12 12">
              <path d="M2 6h8" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
      </div>
      <button class="add-btn" (click)="addColumn()">+ Add Column</button>
    </div>
  </div>

  <!-- Global Sizes Section -->
  <div class="panel-section">
    <div class="section-header" (click)="toggleSizes()">
      <span class="section-title">Cell Sizes</span>
      <svg class="chevron" [class.chevron--open]="sizesExpanded"
           width="12" height="12" viewBox="0 0 12 12">
        <path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.4"
              stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>

    <div class="section-body" *ngIf="sizesExpanded">
      <div class="field-row">
        <label class="field-label">Default col width</label>
        <div class="field-input-row">
          <input class="field-input" type="number" min="40" max="600"
                 [value]="state.defaultColWidth"
                 (change)="onDefaultColWidthChange($any($event.target).value)">
          <span class="field-unit">px</span>
        </div>
        <button class="apply-btn" (click)="applyUniformColWidth()">Apply all</button>
      </div>

      <div class="field-row">
        <label class="field-label">Default row height</label>
        <div class="field-input-row">
          <input class="field-input" type="number" min="24" max="300"
                 [value]="state.defaultRowHeight"
                 (change)="onDefaultRowHeightChange($any($event.target).value)">
          <span class="field-unit">px</span>
        </div>
        <button class="apply-btn" (click)="applyUniformRowHeight()">Apply all</button>
      </div>
    </div>
  </div>

</div>
